name: PDF to Markdown (Google Drive)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Google Drive File ID (dari URL: /d/FILE_ID/)'
        required: true
      output_name:
        description: 'Nama file output (tanpa .md), default: pakai nama file Drive'
        required: false

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pdfplumber pymupdf google-api-python-client google-auth

      - name: Setup service account
        run: |
          echo '${{ secrets.GDRIVE_SA_KEY }}' > /tmp/sa_key.json

      - name: Extract PDF to Markdown
        run: python scripts/extract.py
        env:
          GDRIVE_FILE_ID: ${{ github.event.inputs.file_id }}
          OUTPUT_NAME: ${{ github.event.inputs.output_name }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa_key.json

      - name: Commit hasil
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet && echo "Tidak ada perubahan" || \
            git commit -m "chore: extract $(ls output/*.md | tail -1 | xargs basename) [skip ci]" && \
            git push